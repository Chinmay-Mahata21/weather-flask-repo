<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <h1>🌤 Weather App</h1>

        <form method="POST">
            <input
                type="text"
                name="city"
                placeholder="Enter city name"
                required
            >
            <button type="submit">Search</button>
        </form>

        {% if city_weather %}
        <div class="weather-card">

            <h2>{{ city_weather.city }}</h2>

            <img
                src="https:{{ city_weather.icon }}"
                alt="Weather Icon"
                width="100"
                height="100"
            >

            <div class="info">
                🌡 Temperature:
                <strong>{{ city_weather.temperature }}°C</strong>
            </div>

            <div class="info">
                ☁ Description:
                <strong>{{ city_weather.description }}</strong>
            </div>

        </div>
        {% endif %}

        {% if error %}
        <p class="error">
            {{ error }}
        </p>
        {% endif %}

    </div>

</body>
</html>
